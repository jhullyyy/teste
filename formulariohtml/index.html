<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="formulario.css" media="screen">
    <title>Cadastro</title>
</head>
<body>
    <div>
        <h1 id="titulo">Cadastro de DEVs</h1>
        <h3 id="subtitulo">Complete suas informações</h3>
        <br>
    </div>

    <form>
        <fieldset class="grupo">
            <div class="campo">
                <label for="nome"><strong>Nome</strong></label>
                <input type="text" name="nome" id="nome" required>
            </div>
            <div class="campo">
                <label for="sobrenome"><strong>Sobrenome</strong></label>
                <input type="text" name="sobrenome" id="sobrenome" required>
            </div>
        </fieldset>
        <div class="campo">
            <label for="email"><strong>Email</strong></label>
            <input type="email" name="email" id="email" required>
        </div>
        <div class="campo">
            <label><strong>QUAL LADO DA APLICAÇÃO VOCÊ DESENVOLVE?</strong></label>
            <label>
                <input type="radio" name="devweb" value="frontend" checked> Front-end
            </label>
            <label>
                <input type="radio" name="devweb" value="backend"> Back-end
            </label>
            <label>
                <input type="radio" name="devweb" value="fullstack"> Fullstack
            </label>
        </div>
        <div class="campo">
            <label for="senioridade"><strong>SENIORIDADE</strong></label>
            <select id="senioridade" name="senioridade">
                <option selected disabled value="">Selecione</option>
                <option>Junior</option>
                <option>Pleno</option>
                <option>Senior</option>
            </select>
        </div>
        <fieldset class="grupo">
            <div id="checkbox">
                <label><strong>Selecione as tecnologias que utiliza:</strong></label>
                <input type="checkbox" id="tecnologia1" name="tecnologia" value="CSS">
                <label for="tecnologia1">CSS</label>

                <input type="checkbox" id="tecnologia2" name="tecnologia" value="HTML">
                <label for="tecnologia2">HTML</label>

                <input type="checkbox" id="tecnologia3" name="tecnologia" value="JAVASCRIPT">
                <label for="tecnologia3">JAVASCRIPT</label>

                <input type="checkbox" id="tecnologia4" name="tecnologia" value="PHP">
                <label for="tecnologia4">PHP</label>

                <input type="checkbox" id="tecnologia5" name="tecnologia" value="C#">
                <label for="tecnologia5">C#</label>

                <input type="checkbox" id="tecnologia6" name="tecnologia" value="JAVA">
                <label for="tecnologia6">JAVA</label>

                <input type="checkbox" id="tecnologia7" name="tecnologia" value="PYTHON">
                <label for="tecnologia7">PYTHON</label>
            </div>
        </fieldset>
        <div class="campo">
            <label for="experiencia"><strong>UM POUCO DA SUA EXPERIÊNCIA:</strong></label>
            <textarea rows="6" style="width: 26em" id="experiencia" name="experiencia"></textarea>
        </div>
        <div>
            <button class="botao" type="submit">Concluído</button>
        </div>
    </form>
</body>
</html>
